name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_ADSENSE_PUBLISHER_ID: ${{ secrets.PUBLIC_ADSENSE_PUBLISHER_ID }}
          PUBLIC_ADSENSE_SLOT_TOP: ${{ secrets.PUBLIC_ADSENSE_SLOT_TOP }}
          PUBLIC_ADSENSE_SLOT_MID: ${{ secrets.PUBLIC_ADSENSE_SLOT_MID }}
          PUBLIC_ADSENSE_SLOT_BOTTOM: ${{ secrets.PUBLIC_ADSENSE_SLOT_BOTTOM }}
          PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA4_MEASUREMENT_ID }}

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if npx wrangler pages project list 2>&1 | grep -Fq "zerotool-dev"; then
            echo "Project zerotool-dev already exists, skipping create."
          else
            npx wrangler pages project create zerotool-dev --production-branch master
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zerotool-dev --branch=master
