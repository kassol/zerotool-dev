name: Update README tool list

on:
  push:
    branches:
      - master
    paths:
      - 'src/data/tools.ts'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate README tools section
        id: regen
        run: |
          node scripts/update-readme-tools.js
          echo "changed=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit updated README
        if: steps.regen.outputs.changed == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync README tool list from tools.ts"
          git push
