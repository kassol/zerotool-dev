name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Static audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run scripts/audit.mjs
        run: node scripts/audit.mjs

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (icon coverage + OG + astro build + redirects)
        run: npm run build
        env:
          # Inject placeholder values so the build can resolve PUBLIC_* env access.
          # Real production values are injected only in deploy.yml on tag push.
          PUBLIC_ADSENSE_PUBLISHER_ID: ''
          PUBLIC_ADSENSE_SLOT_TOP: ''
          PUBLIC_ADSENSE_SLOT_MID: ''
          PUBLIC_ADSENSE_SLOT_BOTTOM: ''
          PUBLIC_GA4_MEASUREMENT_ID: ''

      - name: Upload dist for inspection
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-on-failure
          path: dist
          retention-days: 7
